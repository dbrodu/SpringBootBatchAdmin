spring.datasource.url=jdbc:h2:mem:batchadmin-test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false
batch.admin.scheduling.pool-size=2
# Static metadata exposed to SpEL expressions in tests.
batch.admin.metadata.region=EU
# Spring Security sits on the test classpath (the starter declares it optional). Without this, Boot's
# default chain would secure every endpoint and break the non-security tests. The component's own
# scoped chains (BatchAdminSecurityAutoConfiguration) and the security test supply their own beans.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
# INFO so the per-execution log-capture integration test can observe captured INFO events.
logging.level.io.batchadmin=INFO

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta th:if="${refresh}" http-equiv="refresh" th:attr="content=${refresh}"/>
  <title th:text="${title}">Spring Batch Admin</title>
  <style>
    :root {
      --bg:#f5f6f8; --panel:#fff; --border:#e2e5ea; --text:#1f2733; --muted:#7a8595;
      --primary:#2f6df6; --primary-dark:#1f57d6; --danger:#e2483a; --ok:#1f9d57; --warn:#d98a16; --run:#2f6df6;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg); color:var(--text); font-size:14px; }
    a { color:var(--primary); text-decoration:none; }
    .app-header { background:var(--panel); border-bottom:1px solid var(--border); padding:0 24px;
      display:flex; align-items:center; gap:32px; position:sticky; top:0; z-index:5; }
    .brand { font-weight:700; font-size:18px; padding:16px 0; white-space:nowrap; }
    .tabs { display:flex; gap:4px; }
    .tabs a { padding:18px 14px; color:var(--muted); border-bottom:3px solid transparent; }
    .tabs a.active { color:var(--primary); border-bottom-color:var(--primary); font-weight:600; }
    .app-main { padding:24px; max-width:1100px; margin:0 auto; }
    .app-footer { text-align:center; color:var(--muted); padding:24px; font-size:12px; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:24px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:20px;
      display:flex; flex-direction:column; gap:6px; }
    .card-live { border-color:var(--primary); box-shadow:0 0 0 2px rgba(47,109,246,.12); }
    .card-value { font-size:30px; font-weight:700; }
    .card-label { color:var(--muted); }
    table.grid { width:100%; border-collapse:collapse; background:var(--panel); border:1px solid var(--border);
      border-radius:10px; overflow:hidden; }
    .grid th, .grid td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:middle; }
    .grid th { background:#fafbfc; font-weight:600; color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.03em; }
    .grid tr:last-child td { border-bottom:none; }
    .grid-inner { margin-top:8px; }
    .subrow { background:#fafbfc; }
    .actions { display:flex; gap:6px; flex-wrap:wrap; }
    .btn { background:var(--panel); border:1px solid var(--border); border-radius:6px; padding:7px 12px;
      cursor:pointer; font-size:13px; color:var(--text); display:inline-block; }
    .btn:hover { border-color:var(--muted); }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .btn-small { padding:4px 8px; font-size:12px; }
    .btn-primary { background:var(--primary); border-color:var(--primary); color:#fff; }
    .btn-primary:hover { background:var(--primary-dark); }
    .btn-danger { color:var(--danger); border-color:#f1c6c1; background:#fff; }
    .toolbar { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .badge { display:inline-block; padding:3px 9px; border-radius:999px; font-size:12px; font-weight:600; }
    .badge-ok { background:#e3f6ec; color:var(--ok); }
    .badge-run { background:#e6effe; color:var(--run); }
    .badge-fail { background:#fce6e3; color:var(--danger); }
    .badge-warn { background:#fbf0db; color:var(--warn); }
    .badge-idle { background:#eef0f3; color:var(--muted); }
    .tag { display:inline-block; padding:2px 8px; border-radius:6px; font-size:11px; background:#e6effe; color:var(--run); }
    .tag-muted { background:#eef0f3; color:var(--muted); }
    .tag-warn { background:#fbf0db; color:var(--warn); }
    .muted { color:var(--muted); }
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px; }
    .field { display:flex; flex-direction:column; gap:4px; margin-bottom:12px; max-width:520px; }
    .field span { color:var(--muted); font-size:12px; }
    input, select, textarea { padding:8px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px;
      background:#fff; color:var(--text); font-family:inherit; }
    textarea { min-height:120px; font-family:'SF Mono',Menlo,Consolas,monospace; }
    input:focus, select:focus, textarea:focus { outline:none; border-color:var(--primary); }
    .inline-form { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .cron-input { font-family:'SF Mono',Menlo,Consolas,monospace; min-width:200px; }
    .status-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
    code { font-family:'SF Mono',Menlo,Consolas,monospace; background:#eef0f3; padding:1px 5px; border-radius:4px; }
    .hint { color:var(--muted); font-size:12px; display:block; margin-top:6px; }
    .banner { padding:12px 16px; border-radius:8px; margin-bottom:18px; }
    .banner-ok { background:#e3f6ec; color:var(--ok); border:1px solid #b8e6cb; }
    .banner-err { background:#fce6e3; color:var(--danger); border:1px solid #f1c6c1; }
    h3 { margin:0 0 12px; } h4 { margin:12px 0 8px; color:var(--muted); }
    details summary { cursor:pointer; }
  </style>
</head>
<body>

<header th:fragment="nav(active)" class="app-header">
  <div class="brand">⚙️ Spring Batch Admin</div>
  <nav class="tabs">
    <a th:href="@{|${basePath}|}" th:classappend="${active == 'dashboard'} ? 'active'">Dashboard</a>
    <a th:href="@{|${basePath}/jobs|}" th:classappend="${active == 'jobs'} ? 'active'">Jobs</a>
    <a th:href="@{|${basePath}/jobs/new|}" th:classappend="${active == 'create'} ? 'active'">Create job</a>
    <a th:href="@{|${basePath}/executions|}" th:classappend="${active == 'executions'} ? 'active'">Executions</a>
    <a th:href="@{|${basePath}/schedules|}" th:classappend="${active == 'schedules'} ? 'active'">Schedules</a>
  </nav>
</header>

<div th:fragment="banner" th:if="${message}">
  <div th:classappend="${error} ? 'banner banner-err' : 'banner banner-ok'" th:text="${message}">message</div>
</div>

<footer th:fragment="footer" class="app-footer">
  Self-hosted job orchestration — a Spring Cloud Data Flow replacement embedded in your Spring Boot Batch app.
</footer>

</body>
</html>

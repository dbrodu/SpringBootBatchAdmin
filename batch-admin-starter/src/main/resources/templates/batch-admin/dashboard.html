<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{batch-admin/fragments :: head('Batch Admin — Dashboard')}"></head>
<body>
<header th:replace="~{batch-admin/fragments :: nav('dashboard')}"></header>
<main class="app-main">
  <div th:replace="~{batch-admin/fragments :: banner}"></div>

  <div class="cards">
    <div class="card"><span class="card-value" th:text="${summary.totalJobs()}">0</span><span class="card-label">Jobs</span></div>
    <div class="card"><span class="card-value" th:text="${summary.dynamicJobs()}">0</span><span class="card-label">Dynamic jobs</span></div>
    <div class="card"><span class="card-value" th:text="${summary.activeSchedules()}">0</span><span class="card-label">Active schedules</span></div>
    <div class="card" th:classappend="${summary.runningExecutions() > 0} ? 'card-live'">
      <span class="card-value" th:text="${summary.runningExecutions()}">0</span><span class="card-label">Running now</span>
    </div>
  </div>

  <h3>Executions by status</h3>
  <div class="status-bar">
    <span th:each="entry : ${summary.statusCounts()}"
          th:class="${@batchAdminFormat.statusClass(entry.key)}"
          th:text="${entry.key + ': ' + entry.value}">COMPLETED: 0</span>
    <span th:if="${summary.statusCounts().isEmpty()}" class="muted">No executions yet.</span>
  </div>

  <h3>Recent executions</h3>
  <table class="grid">
    <thead><tr><th>#</th><th>Job</th><th>Status</th><th>Started</th><th>Duration</th></tr></thead>
    <tbody>
      <tr th:each="e : ${summary.recentExecutions()}">
        <td th:text="${e.executionId()}">1</td>
        <td th:text="${e.jobName()}">job</td>
        <td><span th:class="${@batchAdminFormat.statusClass(e.status())}" th:text="${e.status()}">COMPLETED</span></td>
        <td th:text="${@batchAdminFormat.date(e.startTime() != null ? e.startTime() : e.createTime())}">—</td>
        <td th:text="${@batchAdminFormat.duration(e.durationMs())}">—</td>
      </tr>
      <tr th:if="${summary.recentExecutions().isEmpty()}"><td colspan="5" class="muted">Nothing has run yet.</td></tr>
    </tbody>
  </table>
</main>
<footer th:replace="~{batch-admin/fragments :: footer}"></footer>
</body>
</html>
